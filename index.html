function wxCard(n){
  const w=WX[n]; if(!w) return '';
  return `<div class="wxcard">
    <div class="wxhead"><span>🌤 ${w.place} · 當地天氣</span>
      <button class="wxbtn" onclick="fetchWx(${n},this)">🔄 抓取當日</button></div>
    <div class="wxclim">📅 <b>10 月平均</b>：${w.clim}</div>
    <div class="wxout" id="wxout-${n}"><span class="wxmuted">點「抓取當日」看即時天氣（行程當天最準）</span></div>
  </div>`;
}

async function fetchWx(n, btn){
  const w=WX[n]; const out=document.getElementById('wxout-'+n);
  const old=btn.textContent; btn.disabled=true; btn.textContent='抓取中…';
  out.innerHTML='<span class="wxmuted">連線中…</span>';
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${w.lat}&longitude=${w.lng}`
      +`&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m`
      +`&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max`
      +`&timezone=Pacific%2FAuckland&forecast_days=1`;
    const r=await fetch(url); if(!r.ok) throw new Error('http');
    const j=await r.json(); const c=j.current, dy=j.daily;
    const [ic,desc]=WX_CODE[c.weather_code]||['🌡',''];
    const t=new Date((c.time||'').replace(' ','T'));
    const hhmm=isNaN(t)?'':t.toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false});
    const pp=(dy&&dy.precipitation_probability_max&&dy.precipitation_probability_max[0]!=null)?dy.precipitation_probability_max[0]+'%':'–';
    out.innerHTML=`
      <div class="wxnow"><span class="wxbig">${ic}</span>
        <div><div class="wxtemp">${Math.round(c.temperature_2m)}°C <span class="wxdesc">${desc}</span></div>
        <div class="wxsub">體感 ${Math.round(c.apparent_temperature)}° · 風 ${Math.round(c.wind_speed_10m)} km/h · 濕度 ${c.relative_humidity_2m}%</div></div></div>
      <div class="wxsub2">今日 高 ${Math.round(dy.temperature_2m_max[0])}° / 低 ${Math.round(dy.temperature_2m_min[0])}°　降雨機率 ${pp}</div>
      <div class="wxstamp">紐西蘭當地 ${hhmm} · 即時更新</div>`;
  }catch(e){
    out.innerHTML='<span class="wxmuted">⚠️ 抓取失敗，請確認有連網後再試一次</span>';
  }finally{ btn.disabled=false; btn.textContent=old; }
}

async function fetchAllWx(btn){
  const old=btn.textContent; btn.disabled=true; btn.textContent='全部抓取中…';
  for(const n of Object.keys(WX)){
    const b=document.querySelector(`#wxout-${n}`)?.closest('.wxcard')?.querySelector('.wxbtn');
    if(b) await fetchWx(Number(n), b);
  }
  btn.disabled=false; btn.textContent=old;
}

// ---- tabs ----
const tabsEl=document.getElementById('tabs');
['D0','航班','🛒',...DAYS.map(d=>'D'+d.n),'住宿','伴手禮'].forEach((t,i)=>{
  const b=document.createElement('div');b.className='tab';b.textContent=t;b.onclick=()=>go(i);tabsEl.appendChild(b);
});
const tabEls=[...tabsEl.children];
const pages=[...stage.children];

let cur=0;
const prevB=document.getElementById('prev'),nextB=document.getElementById('next'),indEl=document.getElementById('ind'),homeB=document.getElementById('home');
function go(i,dir){
  if(i<0||i>=pages.length)return;
  const d=dir||(i>cur?24:-24);cur=i;
  pages.forEach((p,k)=>p.classList.toggle('active',k===i));
  pages[i].style.setProperty('--dir',d+'px');void pages[i].offsetWidth;
  tabEls.forEach((t,k)=>t.classList.toggle('on',k===i));
  tabEls[i].scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  prevB.classList.toggle('off',i===0);nextB.classList.toggle('off',i===pages.length-1);
  indEl.innerHTML=i===0?'D0 · 去程':(i<=8?`第 <b>${i}</b> 天 / 8`:(i===9?'住宿':'🛍 伴手禮'));
  homeB.style.display=i===0?'none':'flex';
  window.scrollTo({top:0});
  if(history.replaceState)history.replaceState(null,'',i===0?'#':'#d'+i);
}
prevB.onclick=()=>go(cur-1);nextB.onclick=()=>go(cur+1);homeB.onclick=()=>go(0);
document.querySelectorAll('[data-go]').forEach(r=>r.onclick=()=>go(+r.dataset.go+2));
addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(cur+1);if(e.key==='ArrowLeft')go(cur-1);});
let sx=0,sy=0;
stage.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
stage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.4){dx<0?go(cur+1):go(cur-1);}
},{passive:true});
const m=(location.hash||'').match(/d(\d+)/);
go(m?Math.min(+m[1]+2,10):0);
</script>
