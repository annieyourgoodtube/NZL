DAYS.forEach(d=>{
  const sec=document.createElement('section');
  sec.className='page';sec.style.setProperty('--accent',d.accent);
  const kmcls='km'+(d.soft?' soft':'');
  const rt='🗺 '+d.route.map(r=>`<span>${r}</span>`).join("<span class='sep'>→</span>")
      +` <span class="${kmcls}">${d.km}</span>`;
  const tl=d.tl.map(t=>`<div class="tl-row"><div class="tl-time" style="color:${d.accent}">${t[0]}</div>
      <div class="tl-dot" style="background:${d.accent}"></div><div class="tl-text">${t[1]}</div></div>`).join('');
  const shots=d.shots.map(s=>{
    const stars=s[2]?` <span class="star" style="color:${d.accent}">${'★'.repeat(s[2])}</span>`:'';
    return `<div class="shot"><span class="cam">📷</span><div><b>${s[0]}</b>${stars}<div class="snote">${s[1]}</div></div></div>`;
  }).join('');
  const note=d.note?`<div class="note">⚠️ <div>${d.note}</div></div>`:'';
  const dm=d.date.match(/^(.+?)\s*\((.)\)/);
  const dateMain=dm?dm[1]:d.date, wd=dm?wmap[dm[2]]:'';
  sec.innerHTML=`
    <div class="dtop"><span class="k">DAY ${d.n} / 9</span><span class="k">${dateMain}　<b style="color:${d.accent};font-weight:700">${wd}</b></span></div>

    <p class="credit">南島放空之旅 · Day ${d.n}</p>`;

DAYS.slice(0,9).forEach(d=>{
  const plain=d.stay.replace(/<[^>]+>/g,'').replace('宿 ','');
  const [place,desc]=plain.includes('　')?plain.split('　'):[plain,''];
  const dm=d.date.match(/^(.+?)\s*\((.)\)/);
  const dlabel=dm?`${dm[1]}（${dm[2]}）`:d.date;
  let book='';
  if(/已訂|✅/.test(desc)) book='<span class="abook done">✅ 已訂</span>';
  else if(/務必|搶手|早訂|訂$/.test(desc)) book='<span class="abook">⚠ 最早訂</span>';
  arows+=`<div class="arow" data-go="${d.n}"><div class="an" style="background:${d.accent}">${d.n}</div>
    <div class="ainfo"><div class="adate">${dlabel} · 第 ${d.n} 晚</div><div class="aplace">${place}${book}</div><div class="adesc">${desc}</div></div></div>`;
});
let twdSum=0,twdCount=0;
DAYS.slice(0,9).forEach(d=>{const m=d.stay.match(/TWD\s*([\d,]+)/);if(m){twdSum+=parseInt(m[1].replace(/,/g,''));twdCount++;}});
const lylo=1255;            // 11/19 LyLo Christchurch Airport（列於 Day 1 備註）
const twdAll=twdSum+lylo;
accom.innerHTML=`
  <div class="dtop"><span class="k">STAYS · 住宿總覽</span><span class="k">9 晚</span></div>
  <header class="dhero">
    <div class="hn">STAYS · 九晚住宿</div>
    <h1>🛏️ 住宿地點一覽</h1>
    <div class="hvibe">夜夜湖畔山色 <span>· Where You Sleep</span></div>
  </header>
  <div class="blabel" style="color:#4d7c74">🏨 九晚住宿 · 點任一晚可跳到當天</div>
  <div class="acard">${arows}</div>
  <div class="atotal" style="margin-top:10px;padding:12px 14px;border-radius:12px;background:#eef4f2;border:1px solid #cfe0db">
    <div style="font-weight:700;color:#3a5f59">🧾 住宿費用加總</div>
    <div style="margin-top:5px;font-size:15px">已報價 ${twdCount} 晚 ＋ LyLo 機場夜（11/19）：<b style="color:#3a5f59">TWD ${twdAll.toLocaleString()}</b></div>
    <div style="font-size:12px;color:#7a7a7a;margin-top:5px;line-height:1.7">＋ 第 9 晚 新加坡帝盛 USD 192.39（另計，約 TWD 5,800）</div>
  </div>
  <div class="note">⚠️ <div><b>Mt Cook 村</b> 與 <b>Milford Sound Lodge</b> 是園內／峽灣內唯一住宿，極搶手，建議最早訂這兩晚。</div></div>
  <p class="credit">南島放空之旅 · 住宿總覽</p>`;
stage.appendChild(accom);

// ---- tabs ----
const tabsEl=document.getElementById('tabs');
['封面',...DAYS.map(d=>'D'+d.n),'住宿'].forEach((t,i)=>{
  const b=document.createElement('div');b.className='tab';b.textContent=t;b.onclick=()=>go(i);tabsEl.appendChild(b);
});
const tabEls=[...tabsEl.children];
const pages=[...stage.children];

let cur=0;
const prevB=document.getElementById('prev'),nextB=document.getElementById('next'),indEl=document.getElementById('ind'),homeB=document.getElementById('home');
function go(i,dir){
  if(i<0||i>=pages.length)return;
  const d=dir||(i>cur?24:-24);cur=i;
  pages.forEach((p,k)=>p.classList.toggle('active',k===i));
  pages[i].style.setProperty('--dir',d+'px');void pages[i].offsetWidth;
  tabEls.forEach((t,k)=>t.classList.toggle('on',k===i));
  tabEls[i].scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  prevB.classList.toggle('off',i===0);nextB.classList.toggle('off',i===pages.length-1);
  indEl.innerHTML=i===0?'封面':(i<=9?`第 <b>${i}</b> 天 / 9`:'住宿');
  homeB.style.display=i===0?'none':'flex';
  window.scrollTo({top:0});
  if(history.replaceState)history.replaceState(null,'',i===0?'#':'#d'+i);
}
prevB.onclick=()=>go(cur-1);nextB.onclick=()=>go(cur+1);homeB.onclick=()=>go(0);
document.getElementById('startBtn').onclick=()=>go(1);
document.querySelectorAll('[data-go]').forEach(r=>r.onclick=()=>go(+r.dataset.go));
addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(cur+1);if(e.key==='ArrowLeft')go(cur-1);});
let sx=0,sy=0;
stage.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
stage.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.4){dx<0?go(cur+1):go(cur-1);}
},{passive:true});
const m=(location.hash||'').match(/d(\d+)/);
go(m?Math.min(+m[1],9):0);
</script>
</body>
</html>
